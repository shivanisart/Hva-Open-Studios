<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Herts Visual Arts Open Studios Trail</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#333333">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="https://www.hvaf.org.uk/wp-content/uploads/2024/12/hvaf-logo-300.png">
<style>
  html,body{margin:0;padding:0;height:100%;font-family:sans-serif;background:#eaeaea;color:#333;}
  #app{display:flex;flex-direction:column;height:100%;}
  header{background:#333;color:#fff;padding:15px;flex:0 0 auto;}
  #dateBar{display:flex;gap:6px;overflow-x:auto;padding-top:10px;}
  .dateBtn{background:#555;color:#eee;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;}
  .dateBtn.active{background:#fff;color:#333;font-weight:700;}
  
  #loginOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
  #loginOverlay.hide{display:none;}
  #loginBox{background:#fff;border-radius:12px;padding:25px;width:100%;max-width:350px;text-align:center;}
  #areaSummary{width:100%;margin:15px 0;border-collapse:collapse;font-size:13px;}
  #areaSummary th, #areaSummary td{padding:8px;border-bottom:1px solid #ddd;text-align:left;}
  .primaryStartBtn{width:100%;padding:12px;background:#2e8b3d;color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer;}
  
  #mapWrap{flex:1 1 auto;position:relative;background:#929292;}
  #mapCanvas{position:absolute;inset:0;}
  .pin{position:absolute;width:16px;height:16px;border-radius:50%;background:#2e8b3d;border:2px solid #fff;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
</style>
</head>
<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h2>Welcome to the Trail</h2>
    <table id="areaSummary">
      <thead><tr><th>Area</th><th>Total</th><th>Open Today</th></tr></thead>
      <tbody id="summaryBody"><tr><td>St Albans</td><td id="totalCount">0</td><td id="openCount">0</td></tr></tbody>
    </table>
    <input type="email" id="userEmail" placeholder="Enter email" style="width:100%;padding:10px;margin-bottom:15px;box-sizing:border-box;">
    <button class="primaryStartBtn" id="loginSubmitBtn">Start Trail</button>
  </div>
</div>

<div id="app">
  <header>
    <h1>Open Studio Trail</h1>
    <div id="dateBar"></div>
  </header>
  <div id="mapWrap"><div id="mapCanvas"></div></div>
</div>

<script>
const locations = [
  { postcode:"AL3 5RX", venue:"8", days:{ 12:{"Jenny":"10-5"}, 13:{"Jenny":"10-5"} } },
  { postcode:"AL2 3NE", venue:"9", days:{ 16:{"Bob":"7-9pm"}, 17:{"Bob":"11-3"} } }
];

function populateSummary() {
  const today = new Date().getDate();
  document.getElementById('totalCount').textContent = locations.length;
  document.getElementById('openCount').textContent = locations.filter(l => l.days[today]).length;
}

function buildDateBar() {
  const bar = document.getElementById('dateBar');
  for(let i=5; i<=27; i++) {
    const btn = document.createElement('button');
    btn.className = 'dateBtn' + (i===5?' active':'');
    btn.textContent = i;
    btn.onclick = () => { document.querySelectorAll('.dateBtn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); };
    bar.appendChild(btn);
  }
}

document.getElementById('loginSubmitBtn').onclick = () => {
  if(document.getElementById('userEmail').value.includes('@')) {
    document.getElementById('loginOverlay').classList.add('hide');
    buildDateBar();
  } else { alert("Enter email"); }
};

populateSummary();
</script>
</body>
</html>
