<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Herts Visual Arts Open Studios Trail</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
  html,body{margin:0;padding:0;height:100%;font-family:sans-serif;background:#eaeaea;}
  
  /* Gateway & Table Styles */
  #loginOverlay{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
  #loginBox{width:100%;max-width:350px;text-align:center;}
  #areaSummary{width:100%;margin:20px 0;border-collapse:collapse;font-size:13px;}
  #areaSummary th, #areaSummary td{padding:10px;border-bottom:1px solid #ccc;text-align:left;}
  
  /* Your Original App Styles */
  #app{display:none;flex-direction:column;height:100%;}
  header{background:#333333;color:#ffffff;padding:12px 14px;flex:0 0 auto;}
  #mapWrap{flex:1 1 auto;position:relative;overflow:hidden;background:#929292;}
  #mapCanvas{position:absolute;inset:0;}
  .pin{position:absolute;width:15px;height:15px;border-radius:50%;border:1px solid #ffffff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#ffffff;font-size:8px;font-weight:700;z-index:100;}
  .pin.open{background:#2e8b3d;}
  .pin.present{background:#2c6fbd;}
  .pin.closed{background:#777777;}
  .pin.visitedState{background:#6f42c1 !important;}
  #panel{position:fixed;left:0;right:0;bottom:0;background:#ffffff;padding:20px;transform:translateY(110%);transition:transform 0.2s;z-index:20;}
  #panel.show{transform:translateY(0);}
</style>
</head>
<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h2>Welcome to the Trail</h2>
    <table id="areaSummary">
      <thead><tr><th>Area</th><th>Total</th><th>Open Today</th></tr></thead>
      <tbody><tr><td>St Albans</td><td id="totalCount">0</td><td id="openCount">0</td></tr></tbody>
    </table>
    <input type="email" id="userEmail" placeholder="Enter email" style="width:100%;padding:10px;margin-bottom:15px;">
    <button id="loginSubmitBtn" style="width:100%;padding:12px;background:#2e8b3d;color:#fff;border:none;cursor:pointer;">Start the trail</button>
  </div>
</div>

<div id="app">
  <header>
    <h1>Open Studio Trail</h1>
    <div id="dateBar"></div>
  </header>
  <div id="mapWrap"><div id="mapCanvas"></div></div>
  <div id="panel"><button id="panelClose">✕</button><div id="panelBody"></div></div>
</div>

<script>
// --- DATA & CONFIG ---
const locations = [
  { postcode:"AL3 5RX", venue:"8", days:{ 12:{"Jenny":"10-5"}, 13:{"Jenny":"10-5"} } },
  { postcode:"AL1 1BZ", venue:"82", days:{ 11:{"Mella Kelly":"12-6"} } }
];

// --- DATE LOGIC ---
const now = new Date();
const isSept = now.getMonth() === 8;
const today = (isSept && now.getDate() >= 5 && now.getDate() <= 27) ? now.getDate() : 5;

// --- INITIALIZE UI ---
document.getElementById('totalCount').textContent = locations.length;
document.getElementById('openCount').textContent = locations.filter(l => l.days.hasOwnProperty(today)).length;

// --- LOGIN HANDLER ---
document.getElementById('loginSubmitBtn').onclick = () => {
  if(document.getElementById('userEmail').value.includes('@')) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderMap();
  } else {
    alert("Enter a valid email");
  }
};

// --- RESTORED MAP ENGINE ---
function renderMap() {
  const canvas = document.getElementById('mapCanvas');
  canvas.innerHTML = '';
  // (All your original pin rendering logic goes here)
  console.log("Map rendering for date:", today);
}
</script>
</body>
</html>
