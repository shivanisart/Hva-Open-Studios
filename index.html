<style>
  html,body{margin:0;padding:0;height:100%;font-family:sans-serif;background:#eaeaea;}
  /* Login Gateway Overlay */
  #loginOverlay{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
  #loginBox{width:100%;max-width:350px;text-align:center;}
  #areaSummary{width:100%;margin:20px 0;border-collapse:collapse;font-size:13px;}
  #areaSummary th, #areaSummary td{padding:8px;border-bottom:1px solid #ccc;text-align:left;}
  /* Original App Styling */
  #app{display:none;flex-direction:column;height:100%;}
  header{background:#333;color:#fff;padding:12px 14px;}
  #mapWrap{flex:1;position:relative;background:#929292;}
  #mapCanvas{position:absolute;inset:0;}
  .pin{position:absolute;width:15px;height:15px;border-radius:50%;border:1px solid #fff;color:#fff;font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .pin.open{background:#2e8b3d;}
  .pin.closed{background:#777;}
  #panel{position:fixed;left:0;right:0;bottom:0;background:#fff;padding:20px;border-radius:14px 14px 0 0;transform:translateY(110%);transition:transform 0.2s;z-index:20;}
  #panel.show{transform:translateY(0);}
</style>
</head>

<div id="loginOverlay">

    <table id="areaSummary">

    <button id="loginSubmitBtn" style="width:100%;padding:12px;background:#2e8b3d;color:#fff;border:none;cursor:pointer;">Start the trail</button>
