<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVA Open Studios 2026 - St Albans Trail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        :root { --hva-green: #2e8b3d; --hva-dark: #333; --hva-accent: #6f42c1; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #app { display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--hva-dark); color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #map { flex: 1; z-index: 1; }
        .panel { position: fixed; bottom: 0; left: 0; width: 100%; height: 80%; background: #fff; border-radius: 20px 20px 0 0; z-index: 3000; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; box-sizing: border-box; overflow-y: auto; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .panel.show { transform: translateY(0); }
        .btn-close { background: #eee; border: none; padding: 10px 20px; border-radius: 20px; margin-bottom: 20px; font-weight: bold; cursor: pointer; }
        .list-row { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .marker-visited { background-color: var(--hva-accent) !important; border: 2px solid #fff; }
        .action-area { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; height: 120px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none; }
        .btn-action { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #fff; }
        .btn-visit { background: var(--hva-accent); }
        .btn-visit.is-active { background: #999; }
        .btn-save { background: var(--hva-green); }
    </style>
</head>
<body>

<div id="app">
    <header>
        <strong>HVA St Albans 2026</strong>
        <button onclick="toggleList()">Artists List</button>
    </header>
    <div id="map"></div>
</div>

<div id="detailPanel" class="panel">
    <button class="btn-close" onclick="closePanels()">Close</button>
    <div id="detailContent"></div>
</div>

<div id="listPanel" class="panel">
    <button class="btn-close" onclick="closePanels()">Close</button>
    <div id="listContent"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
    const artists = [
        { id: "8", name: "Jenny Robinson", lat: 51.7649, lng: -0.3343 },
        { id: "9", name: "Amanda Xuereb", lat: 51.7150, lng: -0.3350 },
        { id: "10", name: "Abigail Lagden", lat: 51.7549, lng: -0.3518 }
    ];

    const map = L.map('map').setView([51.75, -0.33], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let visited = JSON.parse(localStorage.getItem('hva_visited') || '[]');
    let notes = JSON.parse(localStorage.getItem('hva_notes') || '{}');

    function updateMarkers() {
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
        artists.forEach(a => {
            const isVisited = visited.includes(a.id);
            const icon = L.divIcon({
                className: 'marker ' + (isVisited ? 'marker-visited' : ''),
                html: `<div style="width:20px;height:20px;border-radius:50%;background:${isVisited ? '#6f42c1' : '#2e8b3d'}"></div>`
            });
            L.marker([a.lat, a.lng], {icon}).addTo(map).on('click', () => showDetail(a));
        });
    }

    function showDetail(a) {
        const isVisited = visited.includes(a.id);
        document.getElementById('detailContent').innerHTML = `
            <h1>${a.name}</h1>
            <p>Venue ID: ${a.id}</p>
            <div class="action-area">
                <button class="btn-action btn-visit ${isVisited ? 'is-active' : ''}" onclick="toggleVisit('${a.id}')">
                    ${isVisited ? '✓ Marked Visited' : 'Mark as Visited'}
                </button>
                <textarea id="noteArea" placeholder="Your thoughts...">${notes[a.id] || ''}</textarea>
                <button class="btn-action btn-save" onclick="saveNote('${a.id}')">Save Note</button>
            </div>
        `;
        document.getElementById('detailPanel').classList.add('show');
    }

    function toggleVisit(id) {
        visited = visited.includes(id) ? visited.filter(i => i !== id) : [...visited, id];
        localStorage.setItem('hva_visited', JSON.stringify(visited));
        updateMarkers();
        closePanels();
    }

    function saveNote(id) {
        notes[id] = document.getElementById('noteArea').value;
        localStorage.setItem('hva_notes', JSON.stringify(notes));
        alert('Note saved!');
    }

    function toggleList() {
        const list = document.getElementById('listContent');
        list.innerHTML = artists.map(a => `
            <div class="list-row" onclick="showDetail(artists.find(i=>i.id=='${a.id}')); toggleList();">
                <span>${a.name}</span>
                <span>${visited.includes(a.id) ? '✅' : '⚪'}</span>
            </div>
        `).join('');
        document.getElementById('listPanel').classList.toggle('show');
    }

    function closePanels() {
        document.getElementById('detailPanel').classList.remove('show');
        document.getElementById('listPanel').classList.remove('show');
    }

    updateMarkers();
</script>
</body>
</html>
