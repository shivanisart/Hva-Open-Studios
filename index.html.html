// ---- PROJECTION -------------------------------------------------------
const LAT_MIN=51.700, LAT_MAX=51.790, LNG_MIN=-0.400, LNG_MAX=-0.240;
function project(lat,lng,w,h){
  const x = (lng-LNG_MIN)/(LNG_MAX-LNG_MIN)*w;
  const y = (LAT_MAX-lat)/(LAT_MAX-LAT_MIN)*h;
  return [x,y];
}

  if(y === 2026 && m === 6){
    const d = now.getDate();
    if(d >= 5 && d <= 27) return d;
  }
  return null; // outside trail dates - no "today" highlight
}
const TODAY = getTodayInTrail();
let selectedDate = TODAY || 5;
let directionsMode = false;
let routePicks = []; // up to 2 location objects

function dayLabel(d){ return d + (d===TODAY ? " (today)" : ""); }

function haversineMiles(lat1,lng1,lat2,lng2){
  const R=3958.8, toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

document.getElementById('dirToggle').onclick = ()=>{
  directionsMode = !directionsMode;
  routePicks = [];
  document.getElementById('dirToggle').className = directionsMode ? 'active' : '';
  document.getElementById('dirHint').textContent = directionsMode ? 'Tap two venues to route between them' : '';
  document.getElementById('routeCard').classList.remove('show');
  closePanel();
  renderMap();
};

function showRouteCard(){
  const card = document.getElementById('routeCard');
  if(routePicks.length < 2){
    card.classList.remove('show');
    return;
  }
  const [a,b] = routePicks;
  const ca = COORDS[a.postcode], cb = COORDS[b.postcode];
  const miles = haversineMiles(ca[0],ca[1],cb[0],cb[1]).toFixed(2);
  const appleUrl = `https://maps.apple.com/?saddr=${encodeURIComponent(a.postcode)}&daddr=${encodeURIComponent(b.postcode)}&dirflg=w`;
  const googleUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(a.postcode)}&destination=${encodeURIComponent(b.postcode)}&travelmode=walking`;
  card.innerHTML = `
    <div class="rTitle">Venue ${a.venue} (${a.postcode}) → Venue ${b.venue} (${b.postcode})</div>
    <div>Straight-line distance: ~${miles} miles</div>
    <div class="rBtns">
      <button class="appleBtn" onclick="window.open('${appleUrl}','_blank')">Apple Maps</button>
      <button class="googleBtn" onclick="window.open('${googleUrl}','_blank')">Google Maps</button>
      <button class="resetBtn" id="routeReset">Reset</button>
    </div>`;
  card.classList.add('show');
  document.getElementById('routeReset').onclick = ()=>{ routePicks=[]; card.classList.remove('show'); renderMap(); };
}

function handlePinTap(loc){
  if(directionsMode){
    if(routePicks.find(l=>l===loc)) return;
    routePicks.push(loc);
    if(routePicks.length > 2) routePicks.shift();
    renderMap();
    showRouteCard();
  } else {
    openPanel(loc);
  }
}

function buildDateBar(){
  const bar = document.getElementById('dateBar');
  DATES.forEach(d=>{
    const anyOpen = locations.some(l=>l.days[d]);
    const btn = document.createElement('button');
    btn.className = 'dateBtn' + (d===selectedDate?' active':'') + (anyOpen?'':' noOpenings');
    btn.textContent = dayLabel(d);
    btn.onclick = ()=>{ selectedDate = d; refreshDateBar(); renderMap(); };
    btn.id = 'date-'+d;
    bar.appendChild(btn);
  });
}
function refreshDateBar(){
  DATES.forEach(d=>{
    document.getElementById('date-'+d).className = 'dateBtn' + (d===selectedDate?' active':'') + (locations.some(l=>l.days[d])?'':' noOpenings');
  });
}

function openPanel(loc){
  const body = document.getElementById('panelBody');
  const openToday = loc.days[selectedDate];
  let html = `<h2>Venue ${loc.venue} — ${loc.postcode}</h2><div class="sub">${selectedDate}th July${openToday ? (loc.present ? ' · Artist present' : ' · Artwork on display') : ''}</div>`;
  if(openToday){
    Object.entries(openToday).forEach(([artist,hrs])=>{
      html += `<div class="artistRow"><strong>${artist}</strong> — <span class="hrs">${hrs}</span></div>`;
    });
  } else {
    html += `<div class="closedMsg">Closed on ${selectedDate}th July.</div>`;
  }
  body.innerHTML = html;
  document.getElementById('panel').classList.add('show');
  document.getElementById('scrim').classList.add('show');
}
function closePanel(){
  document.getElementById('panel').classList.remove('show');
  document.getElementById('scrim').classList.remove('show');
}
document.getElementById('panelClose').onclick = closePanel;
document.getElementById('scrim').onclick = closePanel;

function buildListView(){
  document.getElementById('listTitle').textContent = `All Artists — ${selectedDate}th July`;
  const openCol = document.getElementById('listOpen');
  const closedCol = document.getElementById('listClosed');
  openCol.innerHTML = ''; closedCol.innerHTML = '';
  locations.forEach(loc=>{
    const today = loc.days[selectedDate];
    if(today){
      Object.entries(today).forEach(([artist,hrs])=>{
        const row = document.createElement('div');
        row.className = 'listRow';
        const dotColor = loc.present ? '#2c6fbd' : '#2e8b3d';
        row.innerHTML = `<span class="listDot" style="background:${dotColor}"></span>
          <span><span class="lname">${artist}</span><span class="lmeta">Venue ${loc.venue} · ${loc.postcode} · ${hrs}</span></span>`;
        row.onclick = ()=>{ closeListPanel(); openPanel(loc); };
        openCol.appendChild(row);
      });
    } else {
      // closed today - list once per location with its usual artist(s)
      const allArtists = new Set();
      Object.values(loc.days).forEach(d=>Object.keys(d).forEach(n=>allArtists.add(n)));
      const row = document.createElement('div');
      row.className = 'listRow';
      row.innerHTML = `<span class="listDot" style="background:#c62828"></span>
        <span><span class="lname">${[...allArtists].join(', ')}</span><span class="lmeta">Venue ${loc.venue} · ${loc.postcode}</span></span>`;
      row.onclick = ()=>{ closeListPanel(); openPanel(loc); };
      closedCol.appendChild(row);
    }
  });
}
function openListPanel(){
  buildListView();
  document.getElementById('listPanel').classList.add('show');
  document.getElementById('scrim').classList.add('show');
}
function closeListPanel(){
  document.getElementById('listPanel').classList.remove('show');
  document.getElementById('scrim').classList.remove('show');
}
document.getElementById('listToggle').onclick = openListPanel;
document.getElementById('listClose').onclick = closeListPanel;
document.getElementById('scrim').addEventListener('click', closeListPanel);

function renderMap(){
  const canvas = document.getElementById('mapCanvas');
  canvas.innerHTML = '';
  const w = canvas.clientWidth, h = canvas.clientHeight;

  LANDMARKS.forEach(lm=>{
    const [x,y] = project(lm.lat, lm.lng, w, h);
    const dot = document.createElement('div');
    dot.className = 'landmarkDot';
    dot.style.left = x+'px'; dot.style.top = y+'px';
    canvas.appendChild(dot);
    const label = document.createElement('div');
    label.className = 'landmark';
    label.textContent = lm.name;
    label.style.left = x+'px'; label.style.top = (y-10)+'px';
    canvas.appendChild(label);
  });

  // route line (drawn first, under pins)
  if(directionsMode && routePicks.length === 2){
    const [a,b] = routePicks;
    const ca = COORDS[a.postcode], cb = COORDS[b.postcode];
    const [x1,y1] = project(ca[0],ca[1],w,h);
    const [x2,y2] = project(cb[0],cb[1],w,h);
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS,'svg');
    svg.setAttribute('width', w); svg.setAttribute('height', h);
    svg.style.position='absolute'; svg.style.left='0'; svg.style.top='0'; svg.style.pointerEvents='none';
    const line = document.createElementNS(svgNS,'line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke','#4a7fb5'); line.setAttribute('stroke-width','3');
    line.setAttribute('stroke-dasharray','6,5');
    svg.appendChild(line);
    canvas.appendChild(svg);
  }

  locations.forEach(loc=>{
    const c = COORDS[loc.postcode];
    if(!c) return;
    const [x,y] = project(c[0], c[1], w, h);
    const openToday = loc.days[selectedDate];
    const isPicked = routePicks.includes(loc);
    let stateClass = 'closed';
    if(openToday) stateClass = loc.present ? 'present' : 'open';
    const pin = document.createElement('div');
    pin.className = 'pin ' + stateClass + (isPicked ? ' picked' : '');
    pin.style.left = x+'px'; pin.style.top = y+'px';
    pin.onclick = ()=>handlePinTap(loc);
    canvas.appendChild(pin);

    const num = document.createElement('div');
    num.className = 'pinNum';
    num.textContent = loc.venue;
    num.style.left = x+'px'; num.style.top = y+'px';
    canvas.appendChild(num);
  });
}

buildDateBar();
window.addEventListener('resize', renderMap);
renderMap();
</script>
</body>
</html>
